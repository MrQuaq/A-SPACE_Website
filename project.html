<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>A.SPACE</title>

    <script src="https://unpkg.com/swup@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script defer src="script.js"></script>

    <link rel="stylesheet" href="stylesheets/style.css">

</head>

<body>
    <header>
        <div class="Logo">
            <img src="assets/A-SPACE_Logo2.png" alt="">
        </div>
        <nav>
            <ul>
                <li><a href="index.html" class="home">HOME</a></li>
                <li><a href="about.html" class="about">ABOUT</a></li>
                <li><a href="projects.html" class="projects">PROJECTS</a></li>
                <li><a href="blog.html" class="blog">BLOG</a></li>
                <li><a href="gallery.html" class="gallery">GALLERY</a></li>
            </ul>
        </nav>
    </header>

    <main id="swup" class="transition-fade">
    
        <article class="project">
        
            <section class="project_hero">
            
                <span id="projectStatus" class="project_status"></span>
            
                <h1 id="projectTitle" class="project_title"></h1>
            
                <p id="projectDescription" class="project_description"></p>
            
                <div class="project_specs">
                
                    <div class="project_spec">
                        <span>Started</span>
                        <strong id="projectYear"></strong>
                    </div>
                
                    <div class="project_spec">
                        <span>Duration</span>
                        <strong id="projectDuration"></strong>
                    </div>
                
                    <div class="project_spec">
                        <span>Platform</span>
                        <strong id="projectPlatform"></strong>
                    </div>
                
                    <div class="project_spec">
                        <span>Progress</span>
                        <strong id="projectProgress"></strong>
                    </div>
                
                </div>
            
            </section>
        
            <img
                id="projectHeroImage"
                class="project_hero_image">
        
            <section
                id="projectContent"
                class="article_content">
        
            </section>
        
        </article>
    
    </main>

    <footer>
        <div class="footer_column_1">
            <img src="assets/A-SPACE_Logo.png" alt="">
        </div>
        <div class="footer_column_2">
            <h3>Contact me</h3>
            <p>Feel free to contact me about project or article questions!</p>
            <button>Contact</button>
        </div>
        <div class="footer_column_3">
            <h5>Sem Acou</h5>
            <p>email</p>
        </div>
        <div class="footer_copyright">
            <p>&copy 2026 Sem Acou</p>
        </div>
    </footer>

</body>
</html>
